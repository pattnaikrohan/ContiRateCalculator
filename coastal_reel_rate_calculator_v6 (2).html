<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coastal Reel Pricing Estimator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .header p { font-size: 13px; color: #666; margin-top: 4px; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
  select, input[type=number] { width: 100%; padding: 8px 10px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; outline: none; }
  select:focus, input[type=number]:focus { border-color: rgba(0,0,0,0.4); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
  .cbm-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px 12px; background: #f5f4f0; border-radius: 8px; font-size: 13px; }
  .cbm-label { color: #666; }
  .cbm-val { font-weight: 500; color: #1a1a1a; }
  .basis-badge { margin-left: auto; font-size: 11px; padding: 2px 10px; border-radius: 8px; font-weight: 500; }
  .basis-cbm { background: #dbeafe; color: #1d4ed8; }
  .basis-weight { background: #dcfce7; color: #166534; }
  .results { background: #f5f4f0; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; }
  .results-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 1rem; }
  .line-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid rgba(0,0,0,0.1); font-size: 14px; }
  .line-item:last-child { border-bottom: none; }
  .line-label { color: #666; flex: 1; padding-right: 12px; }
  .line-value { font-weight: 500; color: #1a1a1a; white-space: nowrap; }
  .line-muted .line-label, .line-muted .line-value { color: #aaa; }
  .crane-line .line-value { color: #b45309; }
  .fuel-line .line-value { color: #b45309; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 0; font-size: 16px; font-weight: 500; margin-top: 8px; border-top: 0.5px solid rgba(0,0,0,0.2); }
  .total-value { color: #1d4ed8; font-size: 20px; }
  .tc-block { margin-top: 1.25rem; padding: 1rem 1.25rem; background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; }
  .tc-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
  .tc-item { font-size: 12px; color: #888; line-height: 1.6; padding: 3px 0; }
  .empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
  .dim-sep { font-size: 16px; color: #aaa; display: flex; align-items: flex-end; padding-bottom: 8px; justify-content: center; }
  .options-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; cursor: pointer; }
  .options-row input[type=checkbox] { width: auto; cursor: pointer; }
</style>
</head>

          <option value="areac">Area C (1,360 km)</option>
          <option value="andersonpoint">Anderson Point (1,670 km)</option>
          <option value="solomon">Solomon (1,550 km)</option>
        </select>
      </div>
      <div class="field">
        <label>Weight per reel (T)</label>
        <input type="number" id="weight" min="1" max="59" step="0.5" placeholder="e.g. 20" />
      </div>
      <div class="field">
        <label>Number of reels</label>
        <input type="number" id="reels" min="1" max="20" step="1" value="1" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Reel dimensions (per reel)</div>
    <div style="display:grid; grid-template-columns: 1fr 20px 1fr 20px 1fr; gap:6px; align-items:end;">
      <div class="field">
        <label>Length (cm)</label>
        <input type="number" id="dimL" min="1" step="1" placeholder="e.g. 240" />
      </div>
      <div class="dim-sep">×</div>
      <div class="field">
        <label>Width (cm)</label>
        <input type="number" id="dimW" min="1" step="1" placeholder="e.g. 240" />
      </div>
      <div class="dim-sep">×</div>
      <div class="field">
        <label>Height (cm)</label>
        <input type="number" id="dimH" min="1" step="1" placeholder="e.g. 240" />
      </div>
    </div>
    <div id="cbm-display" style="display:none;" class="cbm-row">
      <span class="cbm-label">CBM per reel:</span>
      <span class="cbm-val" id="cbm-val">—</span>
      <span style="margin-left:4px; color:#aaa; font-size:13px;">m³</span>
      <span class="basis-badge" id="basis-badge"></span>
    </div>
  </div>

  <div class="card" style="padding: 1rem 1.25rem;">
    <label class="options-row">
      <input type="checkbox" id="gst" /> Include 10% GST
    </label>
  </div>

  <div id="output"></div>
</div>

<script>
const TARIFF = [

  {w:28, melCart:1300, combined:131.86, demurr:280, mineRates:{hz:1400,bs:1960,bd:2520,mw:10270,ji:10570,sf:10120,cc:11420,tp:11920,wa:10570,ya:10120,cl:11420,el:12720,ac:10120,ap:12870,so:11600}},
  {w:30, melCart:1300, combined:131.86, demurr:280, mineRates:{hz:1400,bs:1960,bd:2520,mw:10270,ji:10570,sf:10120,cc:11420,tp:11920,wa:10570,ya:10120,cl:11420,el:12720,ac:10120,ap:12870,so:11600}},
  {w:32, melCart:1300, combined:131.86, demurr:320, mineRates:{hz:1600,bs:2240,bd:2880,mw:12680,ji:11980,sf:12680,cc:12780,tp:13480,wa:12680,ya:12880,cl:12980,el:14380,ac:12680,ap:14580,so:14200}},
  {w:34, melCart:1500, combined:131.86, demurr:320, mineRates:{hz:1600,bs:2240,bd:2880,mw:12680,ji:11980,sf:12680,cc:12780,tp:13480,wa:12680,ya:12880,cl:12980,el:14380,ac:12680,ap:14580,so:14200}},
  {w:36, melCart:1500, combined:131.86, demurr:320, mineRates:{hz:1600,bs:2240,bd:2880,mw:12680,ji:11980,sf:12680,cc:12780,tp:13480,wa:12680,ya:12880,cl:12980,el:14380,ac:12680,ap:14580,so:14200}},
  {w:38, melCart:1500, combined:131.86, demurr:320, mineRates:{hz:1600,bs:2240,bd:2880,mw:12680,ji:11980,sf:12680,cc:12780,tp:13480,wa:12680,ya:12880,cl:12980,el:14380,ac:12680,ap:14580,so:14200}},
  {w:41, melCart:1500, combined:131.86, demurr:320, mineRates:{hz:1600,bs:2240,bd:2880,mw:12680,ji:11980,sf:12680,cc:12780,tp:13480,wa:12680,ya:12880,cl:12980,el:14380,ac:12680,ap:14580,so:14200}},
  {w:44, melCart:1500, combined:131.86, demurr:320, mineRates:{hz:1600,bs:2240,bd:2880,mw:12680,ji:11980,sf:12680,cc:12780,tp:13480,wa:12680,ya:12880,cl:12980,el:14380,ac:12680,ap:14580,so:14200}},
  {w:46, melCart:1950, combined:131.86, demurr:320, mineRates:{hz:1600,bs:2240,bd:2880,mw:12680,ji:11980,sf:12680,cc:12780,tp:13480,wa:12680,ya:12880,cl:12980,el:14380,ac:12680,ap:14580,so:14200}},
  {w:48, melCart:1950, combined:131.86, demurr:350, mineRates:{hz:1750,bs:2450,bd:3150,mw:12800,ji:12100,sf:12800,cc:12900,tp:13600,wa:12800,ya:13000,cl:13100,el:14500,ac:12800,ap:15700,so:14200}},
  {w:50, melCart:1950, combined:131.86, demurr:350, mineRates:{hz:1750,bs:2450,bd:3150,mw:12800,ji:12100,sf:12800,cc:12900,tp:13600,wa:12800,ya:13000,cl:13100,el:14500,ac:12800,ap:15700,so:16200}},
  {w:52, melCart:1950, combined:131.86, demurr:400, mineRates:{hz:2000,bs:2800,bd:3600,mw:14500,ji:14500,sf:15000,cc:16200,tp:16000,wa:14500,ya:14500,cl:15750,el:16000,ac:15000,ap:16500,so:18500}},
  {w:57, melCart:2300, combined:131.86, demurr:450, mineRates:{hz:2000,bs:2800,bd:3600,mw:16000,ji:16000,sf:16500,cc:17250,tp:17500,wa:16000,ya:17500,cl:17500,el:20000,ac:17000,ap:20500,so:18500}},
  {w:59, melCart:2300, combined:131.86, demurr:450, mineRates:{hz:2000,bs:2800,bd:3600,mw:16000,ji:16000,sf:16500,cc:17250,tp:17500,wa:16000,ya:17500,cl:17500,el:20000,ac:17000,ap:20500,so:18500}},
];

const MINE_KEYS = {mtwhaleback:'mw',jimblebar:'ji',southflank:'sf',christmascreek:'cc',tomprice:'tp',westangeles:'wa',yandi:'ya',cloudbreak:'cl',eliwana:'el',areac:'ac',andersonpoint:'ap',solomon:'so'};
const PERTH_METRO = {hazelmere:'hz',bullsbrook:'bs',boddington:'bd'};
const FUEL_SURCHARGE = 0.38;

function fmt(n) { return '$' + Math.round(n).toLocaleString('en-AU'); }
function findRow(w) { for (const r of TARIFF) { if (r.w >= w) return r; } return TARIFF[TARIFF.length-1]; }

function updateCbm() {
  const L = parseFloat(document.getElementById('dimL').value);
  const W = parseFloat(document.getElementById('dimW').value);
  const H = parseFloat(document.getElementById('dimH').value);
  const weight = parseFloat(document.getElementById('weight').value);
  const disp = document.getElementById('cbm-display');
  const cbmVal = document.getElementById('cbm-val');
  const badge = document.getElementById('basis-badge');

  if (!isNaN(L) && !isNaN(W) && !isNaN(H) && L>0 && W>0 && H>0) {
    const cbm = (L/100)*(W/100)*(H/100);
    cbmVal.textContent = cbm.toFixed(3);
    disp.style.display = 'flex';
    if (!isNaN(weight) && weight>0) {
      if (cbm > weight) { badge.textContent='CBM basis (greater)'; badge.className='basis-badge basis-cbm'; }
      else { badge.textContent='Weight basis (greater)'; badge.className='basis-badge basis-weight'; }
    } else { badge.className='basis-badge'; badge.textContent=''; }
  } else { disp.style.display='none'; }
  calc();
}

function calc() {
  const dest = document.getElementById('dest').value;
  const weightRaw = parseFloat(document.getElementById('weight').value);
  const reels = parseInt(document.getElementById('reels').value) || 1;
  const gst = document.getElementById('gst').checked;
  const L = parseFloat(document.getElementById('dimL').value);
  const W = parseFloat(document.getElementById('dimW').value);
  const H = parseFloat(document.getElementById('dimH').value);
  const out = document.getElementById('output');

  if (!dest || isNaN(weightRaw) || weightRaw<=0) {
    out.innerHTML='<div class="empty">Enter a weight and select a destination to see rates.</div>';
    return;
  }

  let cbmPerReel = null;
  let frtBasis = weightRaw;
  let basisLabel = weightRaw + 'T (weight)';
  if (!isNaN(L) && !isNaN(W) && !isNaN(H) && L>0 && W>0 && H>0) {
    cbmPerReel = (L/100)*(W/100)*(H/100);
    if (cbmPerReel > weightRaw) { frtBasis=cbmPerReel; basisLabel=cbmPerReel.toFixed(3)+' CBM (greater than '+weightRaw+'T)'; }
    else { basisLabel=weightRaw+'T (greater than '+cbmPerReel.toFixed(3)+' CBM)'; }
  }

  const row = findRow(frtBasis);
  const rowW = findRow(weightRaw);
  const isMine = MINE_KEYS[dest] !== undefined;
  const isMetro = PERTH_METRO[dest] !== undefined;
  const isPerthDest = isMine || isMetro || dest==='seafreight';

  let lines = [];
  let total = 0;

  const melCart = rowW.melCart * reels;
  lines.push({label:'Melbourne cartage', value:melCart});
  total += melCart;

  if (weightRaw > 30) {
    const craneMel = 1975 * reels;
    lines.push({label:'Melbourne crane lift (avg. assumption, >30T)', value:craneMel, crane:true});
    total += craneMel;
  }

  const seafrtCalc = frtBasis * row.combined * reels;
  lines.push({label:'Sea freight — '+basisLabel+' × '+fmt(row.combined)+'/FRT', value:seafrtCalc});
  total += seafrtCalc;

  if (isPerthDest) {
    const fremCraneRate = weightRaw < 38 ? 500 : 700;
    const fremCrane = fremCraneRate * reels;
    lines.push({label:'Fremantle crane ('+(weightRaw<38?'<38T @ $500':'≥38T @ $700')+' per reel)', value:fremCrane, crane:true});
    total += fremCrane;
  }

  if (isMetro || isMine) {
    const mkey = isMetro ? PERTH_METRO[dest] : MINE_KEYS[dest];
    const baseTransport = rowW.mineRates[mkey] * reels;
    const fuelAmt = baseTransport * FUEL_SURCHARGE;
    const destLabel = isMetro ? 'Perth metro transport (base rate)' : 'Mine site transport (base rate)';

    lines.push({label:destLabel, value:baseTransport});
    total += baseTransport;

    lines.push({label:'Fuel surcharge (38% of transport)', value:fuelAmt, fuel:true});
    total += fuelAmt;

    const wpCost = 400 * reels;
    lines.push({label:'Western Power permit ($400 per reel)', value:wpCost});
    total += wpCost;

    const portFee = 50 * reels;
    lines.push({label:'Port booking fee ($50 per reel)', value:portFee});
    total += portFee;
  }

  if (gst) {
    const gstAmt = total * 0.10;
    lines.push({label:'GST (10%)', value:gstAmt, muted:true});
    total += gstAmt;
  }

  const linesHTML = lines.map(function(l) {
    return '<div class="line-item'+(l.muted?' line-muted':'')+(l.crane?' crane-line':'')+(l.fuel?' fuel-line':'')+'"><span class="line-label">'+l.label+'</span><span class="line-value">'+fmt(l.value)+'</span></div>';
  }).join('');

  out.innerHTML =
    '<div class="results">' +
    '<div class="results-title">Estimated cost breakdown — '+reels+' reel'+(reels>1?'s':'')+' @ '+weightRaw+'T · FRT basis: '+basisLabel+'</div>' +
    linesHTML +
    '<div class="total-row"><span>Estimated total</span><span class="total-value">'+fmt(total)+'</span></div>' +
    '</div>' +
    '<div class="tc-block">' +
    '<div class="tc-title">Terms &amp; Conditions</div>' +
    '<div class="tc-item">· Seafreight calculated on FRT basis — weight (T) or CBM whichever is greater, at a 1:1 ratio per reel.</div>' +
    '<div class="tc-item">· Seafreight rates subject to fluctuation in BAF, coastal surcharge &amp; local charges. Offer basis 2 units per Mafi trailer. Subject to available equipment and vessel schedule.</div>' +
    '<div class="tc-item">· Melbourne crane cost is an average assumption of $1,975 per reel for reels over 30T. Actual cost determined by terminal operator. Melbourne has fork capacity to approx. 31T subject to reel dimensions.</div>' +
    '<div class="tc-item">· Fremantle crane subject to availability. If unavailable, a mobile crane will be required at cost + 10%. Crane rates reviewed by terminal operator 30 June or as required. Basis vessel discharge at Berth 11 &amp; 12.</div>' +
    '<div class="tc-item">· Destination transport rates are base rates ex Fremantle Port. A 38% fuel surcharge is applied on top and reviewed monthly.</div>' +
    '<div class="tc-item">· Western Power permit ($400 per reel) applicable for reels above 360 cm in height. Applied as a mandatory charge.</div>' +
    '<div class="tc-item">· Port booking fee of $50 per reel applies to all Perth metro and mine site deliveries.</div>' +
    '<div class="tc-item">· Pilot vehicles apply at $400 per reel for movements between 0100–0600hrs on reels 34T–52T.</div>' +
    '<div class="tc-item">· Mine site deliveries allow 5hrs across port &amp; mine site. Time starts from gate entry. Demurrage rate: '+fmt(rowW.demurr)+'/hr after free time allowance.</div>' +
    '<div class="tc-item">· Transport trailers subject to availability. Max loaded height ex Fremantle is 5.8m (incl. 1m for trailer).</div>' +
    '<div class="tc-item">· 10% GST applicable where applicable. All work performed under AAW Global Logistics Pty Ltd general terms &amp; conditions, available upon request.</div>' +
    '<div class="tc-item" style="margin-top:10px; font-weight:500; color:#444;">· This is an estimation only. Final rates applied as per conditions agreed in MF tender.</div>' +
    '</div>';
}

['dest','weight','reels','gst'].forEach(function(id) {
  var el = document.getElementById(id);
  el.addEventListener('change', updateCbm);
  if (el.tagName==='INPUT') el.addEventListener('input', updateCbm);
});
['dimL','dimW','dimH'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', updateCbm);
});
</script>
